<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | {{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/styles.css' | relative_url }}">
</head>
<body>
    <nav>
        <h1><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
        <!-- Class Links -->
        <a href="{{ '/OperationSilkRoadI/' | relative_url }}">Operation Silk Road</a>
        <a href="{{ '/OperationSilkRoadII/' | relative_url }}">Operation Silk Road II</a>
        <a href="{{ '/OperationAchilles/' | relative_url }}">Operation Achilles</a>
        <a href="{{ '/OperationNinjutsuSniff/' | relative_url }}">Operation Ninjutsu Sniff</a>
        <a href="{{ '/OperationReleaseTheK/' | relative_url }}">Operation Release the K...</a>
        <a href="{{ '/OperationPandorasTrove/' | relative_url }}">Operation Pandora's Trove</a>
        <a href="{{ '/AptGetToDaChoppa/' | relative_url }}">apt-get TO DA CHOPPA</a>
    </nav>
    <nav id="left-nav">
    <h2>Sections</h2>
    <ul id="toc"></ul>
    </nav>
    <main class="main-content">
        {{ content }}
    </main>
   
    <script>
    document.addEventListener("DOMContentLoaded", function () {
        const toc = document.getElementById("toc");
        const content = document.querySelector(".main-content");
        const headers = content.querySelectorAll("h1");
    
        // Generate TOC links
        headers.forEach(header => {
            if (!header.id) {
                header.id = header.innerText.toLowerCase().replace(/\s+/g, "-").replace(/[^a-z0-9-]/g, ""); // Generate ID if missing
            }
            
            let link = document.createElement("a");
            link.href = "#" + header.id;
            link.innerText = header.innerText;
    
            let listItem = document.createElement("li");
            listItem.appendChild(link);
            toc.appendChild(listItem);
        });
    
        // Smooth scrolling
        document.querySelectorAll("#toc a").forEach(anchor => {
            anchor.addEventListener("click", function(e) {
                e.preventDefault();
                document.querySelector(this.getAttribute("href")).scrollIntoView({
                    behavior: "smooth",
                    block: "start"
                });
            });
        });
    
        // Highlight active section while scrolling
        window.addEventListener("scroll", () => {
            let fromTop = window.scrollY + 50; // Adjust offset to match section visibility
            headers.forEach(header => {
                let link = document.querySelector(`a[href="#${header.id}"]`);
                if (header.offsetTop <= fromTop && header.offsetTop + header.offsetHeight > fromTop) {
                    link.classList.add("active");
                } else {
                    link.classList.remove("active");
                }
            });
        });
    });
    </script>

    <!-- JavaScript to Add "Copy" Buttons to Code Blocks -->
    <script>
    document.addEventListener("DOMContentLoaded", function() {
        document.querySelectorAll("pre code").forEach((block) => {
            let button = document.createElement("button");
            button.innerText = "Copy";
            button.style.cssText = "position: absolute; right: 10px; top: 10px; background: #555; color: white; border: none; padding: 5px; cursor: pointer;";
            
            let wrapper = document.createElement("div");
            wrapper.style.cssText = "position: relative; display: inline-block; width: 100%;";
            block.parentNode.replaceWith(wrapper);
            wrapper.appendChild(block);
            wrapper.appendChild(button);

            button.addEventListener("click", () => {
                navigator.clipboard.writeText(block.innerText);
                button.innerText = "Copied!";
                setTimeout(() => button.innerText = "Copy", 2000);
            });
        });
    });
    </script>
</body>
</html>
